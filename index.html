<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Canvas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Lato',Arial,sans-serif;font-size:14px;color:#2d3b45;background:#f0f0f0;}

/* ═══════════════════════════════
   TOP BAR — dark charcoal exactly like screenshot
═══════════════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:46px;
  background:#3d3d3d;
  display:flex;align-items:stretch;
  z-index:400;
}

/* "Canvas" white tab — sits flush left, white bg, no top/bottom border */
.brand-tab{
  background:#fff;
  padding:0 24px;
  display:flex;align-items:center;
  font-size:14px;font-weight:400;color:#2d3b45;
  letter-spacing:0;
  border-right:1px solid #ccc;
  min-width:130px;
  flex-shrink:0;
}

/* spacer fills center */
.topbar-spacer{ flex:1; }

/* center: timer + back arrow — absolutely centered */
.timer-center{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  display:flex;align-items:center;gap:8px;
}
.timer-block{ text-align:center; }
.timer-nums{
  font-size:15px;font-weight:700;color:#fff;
  display:block;line-height:1.1;
}
.timer-nums.warn{ color:#ff6b6b; }
.timer-label{ font-size:11px;color:#aaa;display:block; }
.back-btn{
  width:30px;height:30px;border:1px solid #888;border-radius:3px;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#ccc;line-height:1;
}
.back-btn:hover{background:rgba(255,255,255,.1);}

/* right side — submit + à + | + X */
.topbar-right{
  display:flex;align-items:stretch;margin-left:auto;
}
.submit-wrap{
  display:flex;align-items:center;padding:0 12px;
}
.btn-submit{
  background:#0770d3;color:#fff;border:none;
  height:34px;padding:0 20px;border-radius:4px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Lato',Arial,sans-serif;
}
.btn-submit:hover{background:#0558a8;}
.btn-submit:disabled{background:#666;cursor:default;}

.top-a{
  width:50px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:300;color:#e0e0e0;font-style:italic;
  font-family:Georgia,'Times New Roman',serif;
  border-left:1px solid #555;
  cursor:pointer;
}
.top-divider{ width:1px;background:#555; }
.top-x{
  width:50px;display:flex;align-items:center;justify-content:center;
  background:#cc2200;cursor:pointer;
}
.top-x:hover{background:#aa1a00;}
.top-x svg{width:16px;height:16px;stroke:#fff;stroke-width:2.5;stroke-linecap:round;}

/* ═══════════════════════════════
   LEFT SIDEBAR
═══════════════════════════════ */
.sidebar{
  position:fixed;top:96px;left:0;bottom:0;width:52px;
  background:#f0f0f0;
  border-right:2px solid #e8e8e8;
  display:flex;flex-direction:column;align-items:center;
  padding-top:0;z-index:300;
  overflow-y:auto;overflow-x:hidden;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:#ccc;}

.sb-icon{
  width:100%;height:44px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.sb-icon:hover{background:#f2f2f2;}
.sb-icon svg{width:20px;height:20px;fill:none;stroke:#666;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

.sb-divider{width:34px;border:none;border-top:1px solid #ddd;margin:3px 0;}

.sb-num{
  width:100%;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#2d3b45;font-weight:400;
  cursor:pointer;background:none;border:none;
  font-family:'Lato',Arial,sans-serif;
}
.sb-num:hover{background:#f2f2f2;}
.sb-num.answered{color:#0770d3;font-weight:700;}

/* ═══════════════════════════════
   MAIN
═══════════════════════════════ */
.main{
  margin-top:96px;
  margin-left:52px;
  background:#fff;
  min-height:calc(100vh - 96px);
  padding-bottom:80px;
  padding-left:30px;
}

/* ═══════════════════════════════
   QUESTION BLOCK
═══════════════════════════════ */
.qblock{
  background:#fff;
  margin-bottom:0;
  position:relative;
  border-left:1px solid #e0e0e0;
}

/* pin icon top-right */
.q-pin{
  position:absolute;top:12px;right:16px;
  background:none;border:none;cursor:pointer;padding:2px;
  line-height:1;z-index:2;
}
.q-pin svg{width:16px;height:16px;fill:none;stroke:#bbb;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.q-pin:hover svg,.q-pin.on svg{stroke:#555;}

/* question header: badge + type + points */
.q-head{
  padding:10px 44px 0 0px;
  display:flex;align-items:center;gap:10px;
}

/* THE BADGE — sits in gutter, overlaps left edge of white box */
.q-badge{
  background:#3c3c3c;
  color:#fff;
  font-size:13px;font-weight:700;
  padding:4px 16px;
  border-radius:2px;
  min-width:0;text-align:center;line-height:1.4;
  letter-spacing:0.1px;
  display:inline-block;
  position:relative;
  margin-left:-10px;
  flex-shrink:0;
}

.q-meta{
  font-size:13px;color:#666;font-weight:400;
  letter-spacing:0.1px;
}

/* question text */
.q-text{
  padding:10px 20px 12px 16px;
  font-size:14px;line-height:1.7;color:#2d3b45;
}
.q-text p+p{margin-top:10px;}

/* options */
.q-opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:5px 20px 5px 16px;
  cursor:pointer;
}
.q-opt:hover{background:#f7f7f7;}
.q-opt input[type=radio]{
  margin-top:3px;width:16px;height:16px;
  accent-color:#0770d3;flex-shrink:0;cursor:pointer;
}
.q-opt span{font-size:14px;color:#2d3b45;line-height:1.55;cursor:pointer;}
.q-bottom{height:6px;}

/* gap between question cards */
.q-gap{height:1px;background:#e8e8e8;}

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:5px;padding:28px 32px;width:420px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.modal h2{font-size:17px;font-weight:700;margin-bottom:10px;color:#2d3b45;}
.modal p{font-size:13px;color:#555;line-height:1.65;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;}
.mc{background:#fff;border:1px solid #c7cdd1;color:#2d3b45;border-radius:4px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.mc:hover{background:#f5f5f5;}
.mg{background:#0770d3;color:#fff;border:none;border-radius:4px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.mg:hover{background:#0558a8;}

/* ═══════════════════════════════
   SCORE
═══════════════════════════════ */
#score-screen{display:none;padding:80px 30px;text-align:center;}
#score-screen.show{display:block;}
.s-ring{width:150px;height:150px;border-radius:50%;background:#0770d3;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.s-pct{font-size:38px;font-weight:700;color:#fff;}
.s-frac{font-size:13px;color:rgba(255,255,255,.8);}
.s-title{font-size:22px;font-weight:700;margin-bottom:8px;color:#2d3b45;}
.s-sub{font-size:14px;color:#6b7780;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand-tab">Canvas</div>
  <div class="topbar-spacer"></div>

  <!-- centered timer -->
  <div class="timer-center">
    <div class="timer-block">
      <span class="timer-nums" id="tmr">45:00</span>
      <span class="timer-label">Time Remaining</span>
    </div>
    <button class="back-btn">&#8249;</button>
  </div>

  <!-- right: submit + à + X -->
  <div class="topbar-right">
    <div class="submit-wrap">
      <button class="btn-submit" id="submitBtn" onclick="openModal()">Submit</button>
    </div>
    <div class="top-a">&#224;</div>
    <div class="top-divider"></div>
    <div class="top-x">
      <svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
    </div>
  </div>
</div>

<!-- QUIZ CONTROL ROW — white bar with rocket top-left -->
<div style="position:fixed;top:46px;left:0;right:0;height:50px;background:#fff;border-bottom:1px solid #d0d0d0;z-index:250;display:flex;align-items:center;padding:0 0 0 14px;">
  <div style="width:52px;display:flex;align-items:center;justify-content:center;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <!-- rocket body angled 45deg -->
      <path d="M13 3L21 3L21 11" />
      <path d="M21 3L10 14" />
      <!-- nose cone tip -->
      <path d="M10 14L7 11L10 8L16 8L21 3" fill="none"/>
      <!-- rocket body proper -->
      <path d="M8 10L3 15L6 18L11 13" fill="none"/>
      <!-- flame / speed lines bottom-left -->
      <line x1="4" y1="18" x2="2" y2="20"/>
      <line x1="6" y1="19" x2="4" y2="21"/>
      <line x1="8" y1="17" x2="6" y2="19"/>
    </svg>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <!-- arrow right → (first icon in screenshot) -->
  <div class="sb-icon">
    <svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="14 6 20 12 14 18"/></svg>
  </div>
  <!-- thumbtack / pin (second icon) -->
  <div class="sb-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2l1.5 4.5h4l-3.5 2.5 1.5 5L12 11.5 8.5 14l1.5-5L6.5 6.5h4z"/><line x1="12" y1="11.5" x2="12" y2="22"/></svg>
  </div>
  <!-- empty square (third icon) -->
  <div class="sb-icon">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
  </div>
  <!-- monitor screen (fourth icon) -->
  <div class="sb-icon">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
  </div>
  <hr class="sb-divider"/>
  <!-- Q numbers injected by JS -->
</div>

<!-- MAIN -->
<div class="main">
  <div id="qlist"></div>
  <div id="score-screen">
    <div class="s-ring">
      <span class="s-pct" id="s-pct">-</span>
      <span class="s-frac" id="s-frac">-</span>
    </div>
    <div class="s-title">Quiz Submitted</div>
    <div class="s-sub" id="s-det"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Submit Quiz?</h2>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="mc" onclick="closeModal()">Cancel</button>
      <button class="mg" onclick="doSubmit()">Submit</button>
    </div>
  </div>
</div>

<script>
const Q = [
  {q:"A branch of psychology that focuses on the diagnosis, treatment, and prevention of mental health disorders is called:",o:["forensic psychology","clinical psychology","developmental psychology","social psychology"],a:1},
  {q:"A psychology student begins reading about symptoms of various mental disorders and becomes convinced they have several of them. This phenomenon is known as:",o:["hypochondria","malingering","psychology student syndrome","confirmation bias"],a:2},
  {q:"Which of the following manuals is published by the American Psychiatric Association and is the primary diagnostic reference used by mental health professionals in the United States?",o:["ICD-11","DSM-5-TR","PDM-2","RDoC"],a:1},
  {q:"The International Classification of Diseases (ICD) is published by which organization and is used globally to classify both medical and mental health disorders?",o:["American Psychological Association","American Psychiatric Association","World Health Organization","National Institute of Mental Health"],a:2},
  {q:"Which of the following is NOT one of the three D's commonly used to define abnormal behavior?",o:["Distress","Dysfunction","Deviation","Diagnosis"],a:3},
  {q:"A therapist uses techniques from psychoanalysis, cognitive therapy, and behavioral therapy depending on what the client needs. This flexible approach is best described as:",o:["the biomedical model","the eclectic approach","the diathesis-stress model","the sociocultural perspective"],a:1},
  {q:"A psychologist believes that a patient's depression is maintained by learned patterns of avoidance and negative reinforcement. Which perspective does this reflect?",o:["Humanistic perspective","Biological perspective","Behavioral perspective","Evolutionary perspective"],a:2},
  {q:"A therapist helps a client explore how unresolved childhood conflicts and unconscious drives are contributing to their current anxiety. This approach reflects which perspective?",o:["Cognitive perspective","Psychodynamic perspective","Sociocultural perspective","Behavioral perspective"],a:1},
  {q:"Carl Rogers believed that psychological disorders arise when people experience a gap between their real self and their ideal self. This view is most consistent with which perspective?",o:["Biological perspective","Behavioral perspective","Evolutionary perspective","Humanistic perspective"],a:3},
  {q:"A clinician argues that a patient's depression stems from distorted automatic thoughts such as 'I am worthless' and 'Nothing will ever get better.' This reflects which theoretical perspective?",o:["Psychodynamic perspective","Sociocultural perspective","Cognitive perspective","Humanistic perspective"],a:2},
  {q:"Which perspective on psychological disorders argues that certain mental health vulnerabilities exist because they once served adaptive survival functions in ancestral environments?",o:["Sociocultural perspective","Evolutionary perspective","Biopsychosocial model","Cognitive perspective"],a:1},
  {q:"A researcher argues that rates of depression are higher among women in cultures where gender inequality is prevalent and social roles are highly restrictive. This best represents which perspective?",o:["Biological perspective","Humanistic perspective","Sociocultural perspective","Behavioral perspective"],a:2},
  {q:"A psychiatrist proposes that a patient's schizophrenia is primarily caused by a chemical imbalance involving excess dopamine in the brain. This represents which perspective?",o:["Cognitive perspective","Evolutionary perspective","Psychodynamic perspective","Biological perspective"],a:3},
  {q:"Dr. Patel explains a patient's panic disorder by considering genetic vulnerability, a recent traumatic event, lack of social support, and cultural stigma around help-seeking. Dr. Patel is using:",o:["The diathesis-stress model only","The eclectic approach","The biopsychosocial model","The behavioral perspective"],a:2},
  {q:"The diathesis-stress model proposes that psychological disorders develop when:",o:["environmental stress alone exceeds a person's coping ability","a biological predisposition combines with environmental stressors","cognitive distortions are reinforced by negative life events","cultural factors override biological influences"],a:1},
  {q:"Negative attitudes, stereotypes, and discrimination directed at individuals with mental illness are collectively referred to as:",o:["deviation","stigma","dysfunction","distress"],a:1},
  {q:"Maya has an intense, irrational fear of spiders that causes her to avoid going outdoors, miss work, and experience panic attacks whenever she sees one. Her fear is best classified as:",o:["generalized anxiety disorder","panic disorder","agoraphobia","specific phobia"],a:3},
  {q:"A fear of heights that causes significant impairment in daily functioning is specifically called:",o:["agoraphobia","acrophobia","arachnophobia","social anxiety disorder"],a:1},
  {q:"Which of the following terms refers specifically to an intense fear of spiders?",o:["acrophobia","agoraphobia","arachnophobia","claustrophobia"],a:2},
  {q:"Carlos refuses to use public transportation, visit shopping malls, or attend crowded events because he fears having a panic attack and being unable to escape. This pattern is most consistent with:",o:["social anxiety disorder","specific phobia","agoraphobia","generalized anxiety disorder"],a:2},
  {q:"A disorder characterized by recurrent unexpected panic attacks and persistent worry about having future attacks is known as:",o:["generalized anxiety disorder","panic disorder","obsessive-compulsive disorder","agoraphobia"],a:1},
  {q:"Ataque de nervios is a culture-bound syndrome most commonly found in Latino communities. Which of the following best describes it?",o:["A persistent depressive episode lasting more than two years","An episode of intense emotional upset including shouting, crying, trembling, and a sense of being out of control, often triggered by a stressful event","A dissociative state involving amnesia and unplanned travel to a new location","A fear of offending others through one's appearance or body odor"],a:1},
  {q:"An individual experiences intense fear and anxiety in social situations where they might be observed or judged by others. They avoid parties, public speaking, and eating in front of others. This is most consistent with:",o:["panic disorder","agoraphobia","social anxiety disorder","generalized anxiety disorder"],a:2},
  {q:"Taijin Kyofusho is a culture-bound syndrome most prevalent in Japan and Korea. It is best described as:",o:["a fear of open spaces and inability to escape","an intense fear of offending others through one's appearance, body odor, or facial expressions","persistent sadness and loss of interest in daily activities","recurrent intrusive thoughts about contamination"],a:1},
  {q:"A person experiences excessive, uncontrollable worry about many areas of life — health, finances, relationships, and work — nearly every day for more than six months. This best fits which disorder?",o:["panic disorder","social anxiety disorder","specific phobia","generalized anxiety disorder"],a:3},
  {q:"Which of the following correctly distinguishes obsessions from compulsions?",o:["Obsessions are repetitive behaviors; compulsions are intrusive thoughts","Obsessions are intrusive, unwanted thoughts; compulsions are repetitive behaviors performed to reduce the anxiety caused by those thoughts","Obsessions are voluntary; compulsions are involuntary","Obsessions cause pleasure; compulsions cause distress"],a:1},
  {q:"A person persistently accumulates objects of little value and experiences extreme distress at the thought of discarding anything, resulting in a home so cluttered it is no longer livable. This is best classified as:",o:["obsessive-compulsive disorder","hoarding disorder","specific phobia","paranoid personality disorder"],a:1},
  {q:"A combat veteran continues to experience vivid flashbacks, nightmares, hypervigilance, and emotional numbing more than a month after returning home from deployment. This presentation is most consistent with:",o:["acute stress disorder","generalized anxiety disorder","posttraumatic stress disorder","dissociative identity disorder"],a:2},
  {q:"Which of the following disorders is characterized by persistent depressed mood and loss of interest for at least two years, but with symptoms that are less severe than a full major depressive episode?",o:["bipolar II disorder","major depressive disorder","persistent depressive disorder","cyclothymic disorder"],a:2},
  {q:"A patient experiences alternating episodes of mania and depression. During manic episodes, they sleep very little, spend recklessly, and feel euphoric and invincible. During depressive episodes, they are unable to get out of bed. This cycling pattern is most associated with:",o:["major depressive disorder","persistent depressive disorder","schizophrenia","bipolar disorder"],a:3},
  {q:"Which of the following best distinguishes Bipolar I Disorder from Bipolar II Disorder?",o:["Bipolar I involves only depressive episodes; Bipolar II involves only manic episodes","Bipolar I requires at least one full manic episode; Bipolar II involves hypomanic episodes but no full manic episodes","Bipolar I is more common than Bipolar II","Bipolar II always involves psychotic features; Bipolar I does not"],a:1},
  {q:"A child has difficulty sustaining attention, frequently interrupts others, cannot sit still during class, and struggles to complete tasks despite normal intelligence. These symptoms are most consistent with:",o:["autism spectrum disorder","intellectual disability","attention-deficit/hyperactivity disorder (ADHD)","oppositional defiant disorder"],a:2},
  {q:"Autism Spectrum Disorder (ASD) is primarily characterized by which two core symptom domains?",o:["Persistent sadness and social withdrawal","Deficits in social communication and interaction, and restricted, repetitive patterns of behavior","Impulsivity and hyperactivity","Hallucinations and disorganized speech"],a:1},
  {q:"A teenager severely restricts her food intake, has a distorted body image, and weighs significantly less than is healthy for her height and age. She refuses to acknowledge that her weight is dangerously low. This presentation is most consistent with:",o:["bulimia nervosa","binge-eating disorder","persistent depressive disorder","anorexia nervosa"],a:3},
  {q:"Which eating disorder is characterized by recurrent episodes of binge eating followed by compensatory behaviors such as self-induced vomiting, laxative use, or excessive exercise?",o:["anorexia nervosa","binge-eating disorder","hoarding disorder","bulimia nervosa"],a:3},
  {q:"A patient reports hearing voices that comment on his actions, believes the government has implanted a chip in his brain to monitor him, and has been showing these symptoms for over six months. The belief that he is being monitored is an example of:",o:["delusions of grandeur","hallucinations","delusions of persecution","flat affect"],a:2},
  {q:"A patient with schizophrenia rarely speaks, shows no facial expression, and has withdrawn completely from social relationships. These are examples of which category of symptoms?",o:["positive symptoms","negative symptoms","disorganized symptoms","dissociative symptoms"],a:1},
  {q:"The dopamine hypothesis of schizophrenia proposes that:",o:["schizophrenia results from too little dopamine in the prefrontal cortex and too much in mesolimbic pathways","schizophrenia is caused by serotonin deficiency","schizophrenia results from structural damage to the hippocampus","schizophrenia is caused by excessive GABA activity"],a:0},
  {q:"A person suddenly cannot remember who they are, leaves their home, and begins a new life in a different city with no memory of their previous identity. This is most consistent with:",o:["dissociative amnesia","dissociative identity disorder","depersonalization disorder","dissociative fugue"],a:3},
  {q:"A patient exhibits distinct personality states that alternately take control of behavior, each with its own name, memories, and mannerisms. This is best diagnosed as:",o:["schizophrenia","dissociative fugue","borderline personality disorder","dissociative identity disorder"],a:3}
];

let sel=new Array(Q.length).fill(null);
let secs=45*60,done=false,tmrI=null;

function buildNav(){
  document.querySelectorAll('.sb-num').forEach(e=>e.remove());
  const sb=document.getElementById('sidebar');
  Q.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='sb-num'+(sel[i]!==null?' answered':'');
    b.textContent=i+1;
    b.onclick=()=>document.getElementById('q'+i).scrollIntoView({behavior:'smooth',block:'start'});
    sb.appendChild(b);
  });
}

function buildQuestions(){
  const ql=document.getElementById('qlist');
  ql.innerHTML='';
  Q.forEach((q,i)=>{
    if(i>0){const g=document.createElement('div');g.className='q-gap';ql.appendChild(g);}

    const block=document.createElement('div');
    block.className='qblock';
    block.id='q'+i;

    // pin
    const pin=document.createElement('button');
    pin.className='q-pin';
    pin.title='Flag';
    pin.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 2l2.2 6.5H20l-5.1 3.7 1.9 6.5L12 15l-4.8 3.7 1.9-6.5L4 8.5h5.8z"/></svg>`;
    pin.onclick=function(){this.classList.toggle('on');};
    block.appendChild(pin);

    // head
    const head=document.createElement('div');
    head.className='q-head';
    head.innerHTML=`<span class="q-badge">${i+1}</span><span class="q-meta">Multiple Choice &nbsp;&nbsp; 1 point</span>`;
    block.appendChild(head);

    // text
    const qt=document.createElement('div');
    qt.className='q-text';
    qt.innerHTML=q.q.split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    block.appendChild(qt);

    // options
    q.o.forEach((opt,j)=>{
      const lbl=document.createElement('label');
      lbl.className='q-opt';
      const r=document.createElement('input');
      r.type='radio';r.name='q'+i;r.value=j;
      if(sel[i]===j)r.checked=true;
      r.addEventListener('change',()=>pick(i,j));
      const sp=document.createElement('span');
      sp.textContent=opt;
      lbl.appendChild(r);lbl.appendChild(sp);
      block.appendChild(lbl);
    });

    const bot=document.createElement('div');bot.className='q-bottom';
    block.appendChild(bot);
    ql.appendChild(block);
  });
}

function pick(qi,oi){if(done)return;sel[qi]=oi;buildNav();}

function startTimer(){
  tmrI=setInterval(()=>{
    if(secs<=0){clearInterval(tmrI);doSubmit();return;}
    secs--;
    const m=String(Math.floor(secs/60)).padStart(2,'0');
    const s=String(secs%60).padStart(2,'0');
    const el=document.getElementById('tmr');
    el.textContent=`${m}:${s}`;
    if(secs<=300)el.classList.add('warn');
  },1000);
}

function openModal(){
  const ans=sel.filter(v=>v!==null).length;
  const un=Q.length-ans;
  let msg=`You have answered <strong>${ans} of ${Q.length}</strong> questions.`;
  if(un>0)msg+=` <strong style="color:#c0392b">${un} question${un>1?'s':''} unanswered.</strong>`;
  msg+=' Once submitted you cannot return to this attempt.';
  document.getElementById('modal-msg').innerHTML=msg;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}

function doSubmit(){
  if(done)return;done=true;clearInterval(tmrI);closeModal();
  let c=0;Q.forEach((q,i)=>{if(sel[i]===q.a)c++;});
  const pct=Math.round(c/Q.length*100);
  const grade=pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
  document.getElementById('qlist').style.display='none';
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-frac').textContent=c+'/'+Q.length;
  document.getElementById('s-det').textContent=`You answered ${c} of ${Q.length} correctly. Grade: ${grade}`;
  document.getElementById('score-screen').classList.add('show');
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Submitted';
  document.getElementById('tmr').textContent='00:00';
}

buildNav();buildQuestions();startTimer();
</script>
</body>
